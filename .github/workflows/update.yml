name: Update LOTRO RSS

on:
  schedule:
    - cron: "*/15 * * * *"

  workflow_dispatch:


jobs:

  update:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - name: Install Python
      uses: actions/setup-python@v5

      with:
        python-version: "3.x"


    - run: pip install -r requirements.txt

    - run: python lotro_rss.py


    - name: Commit RSS

      run: |

        git config user.name github-actions

        git config user.email github-actions@github.com

        git add feed.xml

        git commit -m "Update LOTRO RSS" || exit 0

        git push
